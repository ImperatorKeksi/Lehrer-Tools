<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Login Test - Oberlinhaus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .content {
            padding: 30px;
        }
        
        .test-section {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .test-section h2 {
            color: #495057;
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .log {
            background: #212529;
            color: #00ff00;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 15px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #495057;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .result {
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
        
        .result.show {
            display: block;
        }
        
        .result.success {
            background: #d4edda;
            border: 2px solid #c3e6cb;
            color: #155724;
        }
        
        .result.error {
            background: #f8d7da;
            border: 2px solid #f5c6cb;
            color: #721c24;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧪 Login System Test</h1>
            <p>Diagnose-Tool für das Authentifizierungs-System</p>
        </div>
        
        <div class="content">
            <!-- Test 1: Backend Erreichbar -->
            <div class="test-section">
                <h2>
                    <span>1️⃣</span> Backend Erreichbarkeit
                    <span id="status1" class="status info">Warte...</span>
                </h2>
                <button onclick="testBackend()">Test starten</button>
                <div id="log1" class="log" style="display:none;"></div>
            </div>
            
            <!-- Test 2: Session Check -->
            <div class="test-section">
                <h2>
                    <span>2️⃣</span> Session Check
                    <span id="status2" class="status info">Warte...</span>
                </h2>
                <button onclick="testSession()">Session prüfen</button>
                <div id="log2" class="log" style="display:none;"></div>
            </div>
            
            <!-- Test 3: Login -->
            <div class="test-section">
                <h2>
                    <span>3️⃣</span> Login Test
                    <span id="status3" class="status info">Warte...</span>
                </h2>
                
                <div class="grid">
                    <div class="form-group">
                        <label>Benutzername</label>
                        <input type="text" id="username" value="admin" placeholder="Benutzername">
                    </div>
                    
                    <div class="form-group">
                        <label>Passwort</label>
                        <input type="password" id="password" placeholder="Passwort">
                    </div>
                </div>
                
                <button onclick="testLogin()">Login testen</button>
                <div id="result3" class="result"></div>
                <div id="log3" class="log" style="display:none;"></div>
            </div>
            
            <!-- Test 4: Pfad-Analyse -->
            <div class="test-section">
                <h2>
                    <span>4️⃣</span> Pfad-Analyse
                </h2>
                <div id="pathInfo" class="log"></div>
            </div>
        </div>
    </div>
    
    <script>
        // Logging Helper
        function log(elementId, message, type = 'info') {
            const logEl = document.getElementById(elementId);
            logEl.style.display = 'block';
            const timestamp = new Date().toLocaleTimeString('de-DE');
            const prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : 'ℹ️';
            logEl.textContent += `[${timestamp}] ${prefix} ${message}\n`;
            logEl.scrollTop = logEl.scrollHeight;
        }
        
        function setStatus(statusId, status, text) {
            const el = document.getElementById(statusId);
            el.className = `status ${status}`;
            el.textContent = text;
        }
        
        // Test 1: Backend Erreichbarkeit
        async function testBackend() {
            const logId = 'log1';
            document.getElementById(logId).textContent = '';
            log(logId, 'Starte Backend-Test...');
            
            const endpoints = [
                'php/auth_check.php',
                './php/auth_check.php',
                '../php/auth_check.php',
                '/php/auth_check.php'
            ];
            
            for (const endpoint of endpoints) {
                try {
                    log(logId, `Teste: ${endpoint}`);
                    const response = await fetch(endpoint, {
                        method: 'GET',
                        credentials: 'same-origin',
                        headers: { 'Accept': 'application/json' }
                    });
                    
                    log(logId, `Status: ${response.status}`);
                    
                    const contentType = response.headers.get('content-type');
                    log(logId, `Content-Type: ${contentType}`);
                    
                    if (response.ok && contentType?.includes('application/json')) {
                        const data = await response.json();
                        log(logId, `✅ ERFOLG mit: ${endpoint}`, 'success');
                        log(logId, `Response: ${JSON.stringify(data, null, 2)}`);
                        setStatus('status1', 'success', 'Funktioniert!');
                        
                        // Speichere funktionierenden Pfad
                        localStorage.setItem('working_api_path', endpoint.replace('auth_check.php', ''));
                        return;
                    }
                    
                } catch (error) {
                    log(logId, `Fehler bei ${endpoint}: ${error.message}`, 'error');
                }
            }
            
            setStatus('status1', 'error', 'Kein Pfad funktioniert!');
            log(logId, 'FEHLER: Keiner der Pfade funktioniert!', 'error');
        }
        
        // Test 2: Session Check
        async function testSession() {
            const logId = 'log2';
            document.getElementById(logId).textContent = '';
            log(logId, 'Starte Session-Check...');
            
            const basePath = localStorage.getItem('working_api_path') || 'php/';
            const url = basePath + 'auth_check.php';
            
            try {
                log(logId, `URL: ${url}`);
                
                const response = await fetch(url, {
                    method: 'GET',
                    credentials: 'same-origin',
                    headers: { 'Accept': 'application/json' }
                });
                
                const data = await response.json();
                log(logId, `Response: ${JSON.stringify(data, null, 2)}`);
                
                if (data.logged_in) {
                    setStatus('status2', 'success', 'Eingeloggt!');
                    log(logId, `✅ Eingeloggt als: ${data.user.username}`, 'success');
                } else {
                    setStatus('status2', 'info', 'Nicht eingeloggt');
                    log(logId, 'ℹ️ Nicht eingeloggt (normal wenn noch kein Login)');
                }
                
            } catch (error) {
                setStatus('status2', 'error', 'Fehler!');
                log(logId, `❌ Fehler: ${error.message}`, 'error');
            }
        }
        
        // Test 3: Login
        async function testLogin() {
            const logId = 'log3';
            const resultEl = document.getElementById('result3');
            document.getElementById(logId).textContent = '';
            resultEl.className = 'result';
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                resultEl.className = 'result error show';
                resultEl.textContent = '❌ Bitte Benutzername und Passwort eingeben!';
                return;
            }
            
            log(logId, 'Starte Login-Test...');
            
            const basePath = localStorage.getItem('working_api_path') || 'php/';
            const url = basePath + 'login.php';
            
            try {
                log(logId, `URL: ${url}`);
                log(logId, `Username: ${username}`);
                
                const formData = new FormData();
                formData.append('username', username);
                formData.append('password', password);
                
                const response = await fetch(url, {
                    method: 'POST',
                    body: formData,
                    credentials: 'same-origin',
                    headers: { 'Accept': 'application/json' }
                });
                
                log(logId, `HTTP Status: ${response.status}`);
                
                const data = await response.json();
                log(logId, `Response: ${JSON.stringify(data, null, 2)}`);
                
                if (data.success) {
                    setStatus('status3', 'success', 'Login erfolgreich!');
                    resultEl.className = 'result success show';
                    resultEl.innerHTML = `
                        ✅ <strong>Login erfolgreich!</strong><br>
                        Benutzer: ${data.user.username}<br>
                        Rolle: ${data.user.role}<br>
                        Email: ${data.user.email}
                    `;
                    log(logId, '✅ Login erfolgreich!', 'success');
                } else {
                    setStatus('status3', 'error', 'Login fehlgeschlagen');
                    resultEl.className = 'result error show';
                    resultEl.textContent = `❌ ${data.message || 'Login fehlgeschlagen'}`;
                    log(logId, `❌ ${data.message}`, 'error');
                }
                
            } catch (error) {
                setStatus('status3', 'error', 'Fehler!');
                resultEl.className = 'result error show';
                resultEl.textContent = `❌ Fehler: ${error.message}`;
                log(logId, `❌ Fehler: ${error.message}`, 'error');
            }
        }
        
        // Test 4: Pfad-Analyse
        function showPathInfo() {
            const info = {
                'Aktuelle URL': window.location.href,
                'Protocol': window.location.protocol,
                'Host': window.location.host,
                'Pathname': window.location.pathname,
                'Origin': window.location.origin,
                '---': '---',
                'Gespeicherter API-Pfad': localStorage.getItem('working_api_path') || 'Noch nicht getestet'
            };
            
            const infoEl = document.getElementById('pathInfo');
            infoEl.textContent = JSON.stringify(info, null, 2);
        }
        
        // Init
        window.addEventListener('DOMContentLoaded', () => {
            showPathInfo();
            console.log('🧪 Test-Seite geladen');
        });
    </script>
</body>
</html>
